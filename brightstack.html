  .badge-green{background:rgba(16,185,129,0.2);color:#6ee7b7}
  .badge-yellow{background:rgba(245,158,11,0.2);color:#fcd34d}
  .badge-red{background:rgba(239,68,68,0.2);color:#fca5a5}
  .badge-blue{background:rgba(59,130,246,0.2);color:#93c5fd}

  .nav-item:hover,.nav-item.active{background:rgba(99,102,241,0.2);color:#a5b4fc}
  .nav-item.active{border-left:3px solid #8b5cf6}
  .float-timer{position:fixed;bottom:20px;right:20px;z-index:1000;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:50px;padding:8px 18px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 8px 32px rgba(99,102,241,0.4);cursor:pointer;user-select:none}
  .task-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);margin-bottom:8px;transition:all .2s}
  .task-item:hover{background:rgba(255,255,255,0.08)}
  .task-item.done{opacity:.5}
  .task-item.done .task-text{text-decoration:line-through;color:#64748b}
  .book-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px;transition:transform .2s,box-shadow .2s}
  .book-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(99,102,241,0.2)}
  .job-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px;transition:all .2s;margin-bottom:12px}
  .job-card:hover{border-color:#8b5cf6;box-shadow:0 8px 30px rgba(139,92,246,0.15)}
  .progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:3px;transition:width .5s ease}
  .tab-btn{padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;border:none;transition:all .2s}
  .tab-btn.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
  .tab-btn:not(.active){background:rgba(255,255,255,0.06);color:#94a3b8}
  .tab-btn:not(.active):hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
  .star{color:#fbbf24}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#4c1d95;border-radius:10px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .4s ease}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .pulse{animation:pulse 2s infinite}
  .streak-fire{font-size:24px;animation:pulse 1s infinite}

function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;if(h>0)return `${h}h ${m}m`;return `${m}m ${sc}s`;}
function today(){return new Date().toISOString().split('T')[0];}
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function stars(n){return '★'.repeat(Math.floor(n))+'☆'.repeat(5-Math.floor(n));}

// ─── GROQ API ─────────────────────────────────────────────────────────────────
async function groqCall(apiKey,prompt){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body:JSON.stringify({model:'llama3-8b-8192',messages:[{role:'user',content:prompt}],max_tokens:1500})
  });
  if(!r.ok)throw new Error('Groq API error');
  const d=await r.json();
  return d.choices[0].message.content;
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({mode,onDone,onSwitch}){
  const [form,setForm]=useState({name:'',email:'',password:'',confirm:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const handle=async()=>{
    setErr('');setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    if(mode==='signup'){
      if(!form.name||!form.email||!form.password){setErr('Please fill all fields.');setLoading(false);return;}
      if(form.password!==form.confirm){setErr('Passwords do not match.');setLoading(false);return;}
      const users=ls('bs_users',[]);
      if(users.find(u=>u.email===form.email)){setErr('Email already registered.');setLoading(false);return;}
      users.push({name:form.name,email:form.email,password:form.password});
      ss('bs_users',users);
      ss('bs_current_user',{name:form.name,email:form.email});
      onDone({name:form.name,email:form.email});
    }else{
      const users=ls('bs_users',[]);
      const u=users.find(u=>u.email===form.email&&u.password===form.password);
      if(!u){setErr('Invalid email or password.');setLoading(false);return;}
      ss('bs_current_user',{name:u.name,email:u.email});
      onDone({name:u.name,email:u.email});
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="glass" style={{borderRadius:20,padding:40,width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:30}}>
          <div style={{fontSize:36,marginBottom:8}}>⚡</div>
          <h2 style={{color:'#fff',fontWeight:800,fontSize:24}}>{mode==='signup'?'Create Account':'Welcome Back'}</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:6}}>{mode==='signup'?'Join thousands of students on CareerPilot':'Continue your study journey'}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {mode==='signup'&&<input className="input" placeholder="Full Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>}
          <input className="input" placeholder="Email Address" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <input className="input" placeholder="Password" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
          {mode==='signup'&&<input className="input" placeholder="Confirm Password" type="password" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})}/>}
          {err&&<div style={{color:'#fca5a5',fontSize:13,textAlign:'center'}}>{err}</div>}
          <button className="btn-primary" style={{marginTop:6}} onClick={handle} disabled={loading}>
            {loading?'Please wait…':mode==='signup'?'Create Account':'Sign In'}
          </button>
        </div>
        <p style={{color:'#64748b',textAlign:'center',marginTop:20,fontSize:13}}>
          {mode==='signup'?'Already have an account? ':'New here? '}
          <span style={{color:'#a78bfa',cursor:'pointer'}} onClick={onSwitch}>{mode==='signup'?'Sign In':'Create Account'}</span>
        </p>
      </div>
    </div>
  );
}

  const [step,setStep]=useState(1);
  const [form,setForm]=useState({
    degree:'B.Tech',branch:'CSE',year:'2nd Year',college:'',
    targetExam:'GATE (CSE)',hoursPerDay:4,weakSubjects:'',strongSubjects:'',targetDate:''
  });
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    setLoading(true);
    await new Promise(r=>setTimeout(r,800));
    ss('bs_profile',form);
    onDone(form);
    setLoading(false);
  };

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#302b63)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="glass" style={{borderRadius:20,padding:40,width:'100%',maxWidth:560}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:36}}>🎓</div>
          <h2 style={{color:'#fff',fontWeight:800,fontSize:22,marginTop:8}}>Set Up Your Profile</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:6}}>Help us personalize your study plan, Hello {user.name}!</p>
        </div>

        {/* Steps indicator */}
        <div style={{display:'flex',gap:8,marginBottom:28}}>
          {[1,2].map(s=>(
            <div key={s} style={{flex:1,height:4,borderRadius:2,background:step>=s?'linear-gradient(90deg,#6366f1,#8b5cf6)':'rgba(255,255,255,0.1)'}}/>
          ))}
        </div>

        {step===1&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <h3 style={{color:'#a5b4fc',fontSize:14,fontWeight:600,marginBottom:4}}>STEP 1 — Education Details</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Degree</label>
                <select className="select" value={form.degree} onChange={e=>setForm({...form,degree:e.target.value})}>
                  {['B.Tech','B.E.','B.Sc','B.Com','B.A.','M.Tech','M.Sc','MBA','MCA'].map(d=><option key={d}>{d}</option>)}
                </select>
              </div>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Branch / Stream</label>
                <select className="select" value={form.branch} onChange={e=>setForm({...form,branch:e.target.value})}>
                  {['CSE','IT','ECE','EE','ME','Civil','Science','Arts','Commerce','Other'].map(b=><option key={b}>{b}</option>)}
                </select>
              </div>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Current Year</label>
                <select className="select" value={form.year} onChange={e=>setForm({...form,year:e.target.value})}>
                  {['1st Year','2nd Year','3rd Year','4th Year','Final Semester','Graduate'].map(y=><option key={y}>{y}</option>)}
                </select>
              </div>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>College (optional)</label>
                <input className="input" placeholder="Your college name" value={form.college} onChange={e=>setForm({...form,college:e.target.value})}/>
              </div>
            </div>
            <button className="btn-primary" onClick={()=>setStep(2)}>Next →</button>
          </div>
        )}

        {step===2&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <h3 style={{color:'#a5b4fc',fontSize:14,fontWeight:600,marginBottom:4}}>STEP 2 — Exam Goals</h3>
            <div>
              <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Target Exam</label>
              <select className="select" value={form.targetExam} onChange={e=>setForm({...form,targetExam:e.target.value})}>
                {EXAMS.map(e=><option key={e}>{e}</option>)}
              </select>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Study Hours / Day</label>
                <select className="select" value={form.hoursPerDay} onChange={e=>setForm({...form,hoursPerDay:+e.target.value})}>
                  {[1,2,3,4,5,6,7,8].map(h=><option key={h} value={h}>{h} hours</option>)}
                </select>
              </div>
              <div>
                <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Target Date (optional)</label>
                <input className="input" type="date" value={form.targetDate} onChange={e=>setForm({...form,targetDate:e.target.value})}/>
              </div>
            </div>
            <div>
              <label style={{color:'#94a3b8',fontSize:12,marginBottom:6,display:'block'}}>Weak Subjects (comma separated)</label>
              <input className="input" placeholder="e.g. Algorithms, DBMS, OS" value={form.weakSubjects} onChange={e=>setForm({...form,weakSubjects:e.target.value})}/>
            </div>

            <div style={{display:'flex',gap:12}}>

              <button className="btn-primary" style={{flex:1}} onClick={submit} disabled={loading}>
                {loading?'Generating your plan… 🤖':'Generate My Study Plan 🚀'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STUDY ROUTINE ────────────────────────────────────────────────────────────
function StudyRoutine({profile,apiKey}){
  const [routine,setRoutine]=useState(ls('bs_routine',null));
  const [loading,setLoading]=useState(false);
  const [aiText,setAiText]=useState(ls('bs_ai_advice',''));
  const [activeSubj,setActiveSubj]=useState(0);

  const topics=profile?(TOPICS_BY_EXAM[profile.targetExam]||TOPICS_BY_EXAM['GATE (CSE)']):TOPICS_BY_EXAM['GATE (CSE)'];

  const generateWithAI=async()=>{
    if(!apiKey){alert('Please add your Groq API key in Settings first.');return;}
    setLoading(true);
    try{
      const prompt=`You are an expert study planner for Indian competitive exams. Create a detailed, week-by-week study schedule for a student with these details:
- Degree: ${profile?.degree||'B.Tech'} ${profile?.branch||'CSE'}
- Target Exam: ${profile?.targetExam||'GATE (CSE)'}
- Study hours per day: ${profile?.hoursPerDay||4}
- Weak subjects: ${profile?.weakSubjects||'Not specified'}
- Strong subjects: ${profile?.strongSubjects||'Not specified'}

Give a 4-week study plan with specific daily time allocation, subject order, and 3 key tips for the student. Be concise and practical.`;
      const txt=await groqCall(apiKey,prompt);
      setAiText(txt);
      ss('bs_ai_advice',txt);
    }catch(e){setAiText('Error calling Groq API. Please check your API key in Settings.');}
    setLoading(false);
  };

  const totalHours=topics.reduce((a,t)=>a+t.hours,0);

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
        <div>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>📅 Study Routine</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>{profile?`${profile.targetExam} preparation plan`:'Your personalized study schedule'}</p>
        </div>
        <button className="btn-primary" onClick={generateWithAI} disabled={loading}>
          {loading?'Generating… 🤖':'🤖 AI Generate Plan'}
        </button>
      </div>

      {aiText&&(
        <div className="card" style={{marginBottom:24,borderColor:'rgba(139,92,246,0.3)'}}>
          <h3 style={{color:'#a78bfa',fontWeight:700,marginBottom:12}}>🤖 AI-Generated Study Plan</h3>
          <pre style={{color:'#cbd5e1',fontSize:13,whiteSpace:'pre-wrap',lineHeight:1.7}}>{aiText}</pre>
        </div>
      )}

      {/* Subject tabs */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
        {topics.map((t,i)=>(
          <button key={i} className={`tab-btn${activeSubj===i?' active':''}`} onClick={()=>setActiveSubj(i)}>
            {t.subject}
          </button>
        ))}
      </div>

      {/* Active subject detail */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20}}>
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{color:'#fff',fontWeight:700,fontSize:16}}>{topics[activeSubj].subject}</h3>
            <div style={{display:'flex',gap:8}}>
              <span className={`badge ${topics[activeSubj].priority==='High'?'badge-red':'badge-yellow'}`}>{topics[activeSubj].priority} Priority</span>
              <span className="badge badge-blue">{topics[activeSubj].hours} hrs</span>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {topics[activeSubj].subtopics.map((sub,j)=>(
              <div key={j} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'rgba(255,255,255,0.04)',borderRadius:8,border:'1px solid rgba(255,255,255,0.06)'}}>
                <span style={{color:'#6366f1',fontSize:18}}>◆</span>
                <span style={{color:'#cbd5e1',fontSize:14}}>{sub}</span>
                <span style={{marginLeft:'auto',color:'#475569',fontSize:12}}>~{Math.round(topics[activeSubj].hours/topics[activeSubj].subtopics.length)}h</span>
              </div>
            ))}
          </div>
        </div>

        {/* Summary panel */}
        <div>
          <div className="card" style={{marginBottom:16}}>
            <h4 style={{color:'#a5b4fc',fontWeight:700,marginBottom:14,fontSize:13}}>📊 SUBJECT BREAKDOWN</h4>
            {topics.map((t,i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{color:'#94a3b8',fontSize:12}}>{t.subject}</span>
                  <span style={{color:'#a78bfa',fontSize:12,fontWeight:600}}>{t.hours}h</span>
                </div>

              </div>
            ))}
            <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',marginTop:12,paddingTop:12,display:'flex',justifyContent:'space-between'}}>
              <span style={{color:'#64748b',fontSize:12}}>Total</span>
              <span style={{color:'#10b981',fontWeight:700}}>{totalHours} hours</span>

          </div>

          <div className="card">
            <h4 style={{color:'#a5b4fc',fontWeight:700,marginBottom:12,fontSize:13}}>⏰ DAILY SCHEDULE</h4>

              ['Morning 6–8 AM','Revision & Practice'],

            ))}

        </div>
      </div>

}

// ─── TASK MANAGER ─────────────────────────────────────────────────────────────
function TaskManager({tasks,setTasks,profile}){
  const [newTask,setNewTask]=useState('');
  const [newType,setNewType]=useState('topic');
  const [newSubject,setNewSubject]=useState('');
  const [filter,setFilter]=useState('all');

  const topics=profile?(TOPICS_BY_EXAM[profile.targetExam]||TOPICS_BY_EXAM['GATE (CSE)']):TOPICS_BY_EXAM['GATE (CSE)'];

  // Auto-seed tasks from exam topics if empty
  useEffect(()=>{
    if(tasks.length===0&&profile){
      const seed=[];
      topics.forEach(subj=>{
        subj.subtopics.slice(0,3).forEach(sub=>{
          seed.push({id:Date.now()+Math.random(),text:sub,subject:subj.subject,type:'topic',done:false,addedAt:new Date().toISOString()});
        });
      });
      setTasks(seed);
    }
  },[profile]);

  const addTask=()=>{
    if(!newTask.trim())return;
    const t={id:Date.now(),text:newTask.trim(),subject:newSubject||'General',type:newType,done:false,addedAt:new Date().toISOString()};
    const updated=[...tasks,t];
    setTasks(updated);
    ss('bs_tasks',updated);
    setNewTask('');
  };

  const toggle=(id)=>{
    const updated=tasks.map(t=>t.id===id?{...t,done:!t.done,doneAt:!t.done?new Date().toISOString():null}:t);
    setTasks(updated);
    ss('bs_tasks',updated);
  };

  const remove=(id)=>{
    const updated=tasks.filter(t=>t.id!==id);
    setTasks(updated);
    ss('bs_tasks',updated);
  };

  const filtered=tasks.filter(t=>{
    if(filter==='all')return true;
    if(filter==='done')return t.done;
    if(filter==='pending')return !t.done;
    if(filter==='topic')return t.type==='topic';
    if(filter==='video')return t.type==='video';
    return true;
  });

  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;

  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>✅ Task Manager</h2>
          <p style={{color:'#64748b',fontSize:13,marginTop:4}}>{done}/{tasks.length} completed ({pct}%)</p>
        </div>
      </div>

      {/* Progress */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{color:'#e2e8f0',fontSize:14}}>Overall Progress</span>
          <span style={{color:'#10b981',fontWeight:700}}>{pct}%</span>
        </div>
        <div className="progress-bar" style={{height:10}}><div className="progress-fill" style={{width:pct+'%'}}/></div>
      </div>

      {/* Add task */}
      <div className="card" style={{marginBottom:20}}>
        <h4 style={{color:'#a5b4fc',fontSize:13,fontWeight:700,marginBottom:12}}>+ ADD NEW TASK</h4>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:10,alignItems:'end'}}>
          <input className="input" placeholder="Task description…" value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()}/>
          <select className="select" value={newType} onChange={e=>setNewType(e.target.value)} style={{width:110}}>
            <option value="topic">📖 Topic</option>
            <option value="video">▶️ Video</option>
            <option value="practice">✏️ Practice</option>
            <option value="revision">🔄 Revision</option>
          </select>
          <button className="btn-primary" onClick={addTask}>Add</button>
        </div>
        <input className="input" placeholder="Subject (optional)" value={newSubject} onChange={e=>setNewSubject(e.target.value)} style={{marginTop:10}}/>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {['all','pending','done','topic','video'].map(f=>(
          <button key={f} className={`tab-btn${filter===f?' active':''}`} onClick={()=>setFilter(f)}>
            {f.charAt(0).toUpperCase()+f.slice(1)} {f==='all'?`(${tasks.length})`:f==='done'?`(${done})`:f==='pending'?`(${tasks.length-done})`:''}
          </button>
        ))}
      </div>

      {/* Task list */}
      <div>
        {filtered.length===0&&<div style={{textAlign:'center',color:'#475569',padding:40}}>No tasks here yet. Add one above!</div>}
        {filtered.map(t=>(
          <div key={t.id} className={`task-item${t.done?' done':''}`}>
            <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)}
              style={{width:18,height:18,cursor:'pointer',accentColor:'#8b5cf6',flexShrink:0,marginTop:2}}/>
            <div style={{flex:1}}>
              <span className="task-text" style={{color:'#e2e8f0',fontSize:14}}>{t.text}</span>
              <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
                <span className="badge badge-purple">{t.subject}</span>
                <span className={`badge ${t.type==='video'?'badge-blue':t.type==='practice'?'badge-green':'badge-purple'}`}>
                  {t.type==='video'?'▶️ Video':t.type==='practice'?'✏️ Practice':t.type==='revision'?'🔄 Revision':'📖 Topic'}
                </span>
                {t.done&&t.doneAt&&<span className="badge badge-green">✓ Done</span>}
              </div>
            </div>

// ─── PERFORMANCE DASHBOARD ────────────────────────────────────────────────────
function PerformanceDashboard({tasks,timerSecs}){
  const dailyTimes=ls('bs_daily_times',{});
  const streak=ls('bs_streak',0);
  const done=tasks.filter(t=>t.done).length;
  const total=tasks.length;
  const bySubject={};
  tasks.forEach(t=>{
    if(!bySubject[t.subject])bySubject[t.subject]={done:0,total:0};
    bySubject[t.subject].total++;
    if(t.done)bySubject[t.subject].done++;
  });

  // Last 7 days
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    const label=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    return{label,mins:Math.round((dailyTimes[key]||0)/60),key};
  }).reverse();

  const maxMins=Math.max(...last7.map(d=>d.mins),1);

  return(
    <div className="fade-in">
      <div style={{marginBottom:24}}>
        <h2 style={{color:'#fff',fontSize:22,fontWeight:800}}>📊 Performance Dashboard</h2>
        <p style={{color:'#64748b',fontSize:13,marginTop:4}}>Your study analytics and progress overview</p>
      </div>

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:16,marginBottom:24}}>
        {[
          {label:'Today',value:fmtTime(timerSecs),icon:'⏱',color:'#6366f1'},
          {label:'Streak',value:streak+' days 🔥',icon:'',color:'#f59e0b'},
          {label:'Tasks Done',value:`${done}/${total}`,icon:'✅',color:'#10b981'},
          {label:'Videos Done',value:ls('bs_watched_videos',[]).length,icon:'▶️',color:'#8b5cf6'},
        ].map(s=>(
          <div key={s.label} className="card" style={{textAlign:'center'}}>
            <div style={{color:s.color,fontSize:22,fontWeight:800,marginBottom:4}}>{s.value}</div>
            <div style={{color:'#64748b',fontSize:12}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>
        {/* Study time chart */}
        <div className="card">
          <h4 style={{color:'#a5b4fc',fontWeight:700,marginBottom:20,fontSize:13}}>📅 STUDY TIME – LAST 7 DAYS</h4>
          <div style={{display:'flex',gap:8,alignItems:'flex-end',height:120}}>
            {last7.map(d=>(

// ─── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('landing'); // landing|auth|apikey|profile|app
  const [authMode,setAuthMode]=useState('login');
  const [user,setUser]=useState(ls('bs_current_user',null));
  const [profile,setProfile]=useState(ls('bs_profile',null));
  const [apiKey,setApiKey]=useState(ls('bs_groq_key',''));
  const [page,setPage]=useState('dashboard');
  const [tasks,setTasks]=useState(ls('bs_tasks',[]));
  const [timerSecs,setTimerSecs]=useState(0);
  const [timerRunning,setTimerRunning]=useState(false);
  const timerRef=useRef(null);
  const dailyRef=useRef(ls('bs_daily_times',{}));

  // Determine initial screen
  useEffect(()=>{
    if(user){
      if(!profile)setScreen('profile');
      else setScreen('app');
    }else{setScreen('landing');}
  },[]);

  // Timer logic
  useEffect(()=>{
    if(screen==='app'){
      setTimerRunning(true);
      const todayKey=today();
      const base=ls('bs_daily_times',{})[todayKey]||0;
      setTimerSecs(base);
    }
  },[screen]);

  useEffect(()=>{
    if(timerRunning){
      timerRef.current=setInterval(()=>{
        setTimerSecs(s=>{
          const next=s+1;
          // Save every 10 seconds
          if(next%10===0){
            const dt=ls('bs_daily_times',{});
            dt[today()]=next;
            ss('bs_daily_times',dt);
            // update streak
            const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
            const yk=yesterday.toISOString().split('T')[0];
            const s2=ls('bs_streak',0);
            if(dt[yk]){ss('bs_streak',s2+1);}
          }
          return next;
        });
      },1000);
    }else{clearInterval(timerRef.current);}
    return()=>clearInterval(timerRef.current);
  },[timerRunning]);

  const onAuthDone=(u)=>{setUser(u);setScreen(profile?'app':'apikey');};
  const onApiKeyDone=(k)=>{if(k){setApiKey(k);ss('bs_groq_key',k);}setScreen(profile?'app':'profile');};
  const onProfileDone=(p)=>{setProfile(p);setScreen('app');};
  const onLogout=()=>{ss('bs_current_user',null);setUser(null);setProfile(null);setScreen('landing');};

  if(screen==='landing')return <LandingPage onAuth={m=>{setAuthMode(m);setScreen('auth');}}/>;
  if(screen==='auth')return <AuthPage mode={authMode} onDone={onAuthDone} onSwitch={()=>setAuthMode(m=>m==='login'?'signup':'login')}/>;
  if(screen==='apikey')return <ApiKeySetup onDone={onApiKeyDone}/>;
  if(screen==='profile')return <ProfileSetup user={user} onDone={onProfileDone}/>;

  const renderPage=()=>{
    switch(page){
      case 'dashboard':return <Dashboard user={user} profile={profile} timerSecs={timerSecs} tasks={tasks} setPage={setPage}/>;
      case 'routine':return <StudyRoutine profile={profile} apiKey={apiKey}/>;
      case 'tasks':return <TaskManager tasks={tasks} setTasks={setTasks} profile={profile}/>;
      case 'videos':return <StudyVideos tasks={tasks} setTasks={setTasks}/>;
      case 'topics':return <ImportantTopics profile={profile}/>;
      case 'notes':return <NotesSection/>;
      case 'books':return <BooksLibrary/>;
      case 'jobs':return <JobFinder/>;
      case 'alerts':return <GovtAlerts/>;
      case 'performance':return <PerformanceDashboard tasks={tasks} timerSecs={timerSecs}/>;
      case 'settings':return <Settings apiKey={apiKey} setApiKey={setApiKey} user={user} onLogout={onLogout}/>;
      default:return <Dashboard user={user} profile={profile} timerSecs={timerSecs} tasks={tasks} setPage={setPage}/>;
    }
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'linear-gradient(135deg,#0f0c29,#1a1535,#0f0c29)'}}>
      <Sidebar page={page} setPage={setPage} user={user}/>
      <div style={{marginLeft:220,flex:1,padding:'32px 36px',maxWidth:'calc(100vw - 220px)',overflowX:'hidden'}}>
        {renderPage()}
      </div>
      <FloatingTimer seconds={timerSecs} running={timerRunning} onToggle={()=>setTimerRunning(r=>!r)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
